[build]
  publish = "."

# Strip .html — redirect to clean URL (mirrors Web.config rule 1)
[[redirects]]
  from = "/*.html"
  to   = "/:splat"
  status = 301
  force  = true

# Serve clean URLs — internally rewrite to .html file (mirrors Web.config rule 2)
[[redirects]]
  from = "/*"
  to   = "/:splat.html"
  status = 200

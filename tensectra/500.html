<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Server Error | Tensectra</title>
  <meta name="robots" content="noindex, nofollow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
</head>
<body>
  
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="navbar-logo">
        <img src="/images/logo-mark.svg" alt="Tensectra">
        <span>TENSECTRA</span>
      </a>
    </div>
  </nav>

  <!-- Error Section -->
  <section class="section" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 100px;">
    <div class="container">
      <div style="text-align: center; max-width: 600px; margin: 0 auto;">
        
        <div style="font-size: 8rem; font-weight: 700; background: linear-gradient(135deg, #ff4444, #ff8844); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; font-family: var(--font-mono);">
          500
        </div>

        <h1 style="font-size: 2rem; margin-bottom: 1rem; color: var(--text-white);">
          Something Went Wrong
        </h1>
        
        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3rem;">
          Our servers encountered an error. Don't worry, our team has been notified and is working on it.
        </p>

        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
          <a href="/" class="btn btn-primary">Go Home</a>
          <a href="/forms/contact" class="btn btn-outline">Report Issue</a>
        </div>

        <div style="margin-top: 3rem; padding: 1.5rem; background: rgba(255, 68, 68, 0.05); border: 1px solid rgba(255, 68, 68, 0.2); border-radius: 8px;">
          <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0;">
            If this problem persists, please email us at 
            <a href="mailto:hello@tensectra.com" style="color: var(--accent-cyan);">hello@tensectra.com</a>
          </p>
        </div>

      </div>
    </div>
  </section>

  <script src="/js/main.js"></script>
</body>
</html>

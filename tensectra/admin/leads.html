<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

      <div><div class="sidebar-logo-text">TENSECTRA</div><div class="sidebar-badge">ADMIN</div></div>
    </div>
    <nav class="sidebar-nav">

      <div class="sidebar-section">CRM</div>
      <a href="/admin/consultancy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Consultancy</a>
      <a href="/admin/applications"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Applications</a>
      <a href="/admin/leads" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>Leads <span class="nav-badge" id="nav-leads-count"></span></a>
      <a href="/admin/payments"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a>
      <div class="sidebar-section">Lists</div>
      <a href="/admin/newsletter"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Newsletter</a>
      <div class="sidebar-section">Careers</div>
      <a href="/admin/jobs"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Job Postings</a>

    <div class="sidebar-footer">
      <span class="sidebar-user-email" id="admin-user-email">Loading...</span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <main class="admin-main">
    <div class="admin-header">
      <div><h1>Product Leads</h1><p class="admin-header-sub" id="header-count">Loading...</p></div>
    </div>
    <div class="admin-content">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all" data-type="all">All Leads</button>
        <button class="filter-btn" data-filter="kit" data-type="kit">Kit Requests</button>
        <button class="filter-btn" data-filter="refcard" data-type="refcard">Reference Cards</button>
        <input class="filter-search" id="search-input" type="text" placeholder="Search name, email, company">
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">Leads</span>
          <span class="table-card-count" id="table-count">0 records</span>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr>
              <th>Name</th><th>Email</th><th>Type</th><th>Status</th>
              <th>Location</th><th>Date</th><th>Actions</th>
            </tr></thead>
            <tbody id="leads-tbody"><tr><td colspan="7" style="text-align:center;padding:40px" class="muted">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/admin.js"></script>
<script>
var allKit = [];
var allRefcard = [];
var filtered = [];
var activeFilter = 'all';
var PAGE_SIZE = 25;
var page = 0;

window.reloadTable = loadData;

document.addEventListener('adminReady', loadData);

async function loadData() {
  var client = window._supabase;
  console.log('[Leads] Loading...');
  
  var kitResult = await client.from('kit_purchase_requests').select('*').order('submitted_at', { ascending: false });
  var refResult = await client.from('reference_card_downloads').select('*').order('downloaded_at', { ascending: false });
  
  if (kitResult.error) console.error('[Leads] Kit error:', kitResult.error);
  if (refResult.error) console.error('[Leads] Refcard error:', refResult.error);
  
  allKit = (kitResult.data || []).map(function(r) { return { ...r, type: 'kit', date: r.submitted_at }; });
  allRefcard = (refResult.data || []).map(function(r) { return { ...r, type: 'refcard', date: r.downloaded_at }; });
  
  var totalCount = allKit.length + allRefcard.length;
  console.log('[Leads] Loaded', totalCount, 'records');
  
  document.getElementById('header-count').textContent = totalCount + ' total leads';
  
  var navBadge = document.getElementById('nav-leads-count');
  if (navBadge && totalCount > 0) navBadge.textContent = totalCount;
  
  applyFilter();
}

function applyFilter() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();
  
  var all = [];
  if (activeFilter === 'all' || activeFilter === 'kit') {
    all = all.concat(allKit);
  }
  if (activeFilter === 'all' || activeFilter === 'refcard') {
    all = all.concat(allRefcard);
  }
  
  filtered = all.filter(function(r) {
    var matchSearch = !q || (r.name||'').toLowerCase().includes(q) || (r.email||'').toLowerCase().includes(q) || (r.company||'').toLowerCase().includes(q);
    return matchSearch;
  });
  
  filtered.sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  });
  
  page = 0;
  renderTable();
}

function renderTable() {
  document.getElementById('table-count').textContent = filtered.length + ' records';
  var start = page * PAGE_SIZE;
  var rows = filtered.slice(start, start + PAGE_SIZE);
  
  if (!rows.length) {
    document.getElementById('leads-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px" class="muted">No records found</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  
  document.getElementById('leads-tbody').innerHTML = rows.map(function(r) {
    var loc = [r.city, r.country].filter(Boolean).join(', ') || '-';
    var typeLabel = r.type === 'kit' ? 'Kit Request' : 'Ref Card';
    var typeBadge = r.type === 'kit' 
      ? '<span class="chip-scholarship" style="background:rgba(0,204,255,0.1);color:#00CCFF;border:1px solid rgba(0,204,255,0.2);">Kit</span>'
      : '<span class="chip-scholarship" style="background:rgba(123,97,255,0.1);color:#7B61FF;border:1px solid rgba(123,97,255,0.2);">Card</span>';
    
    return '<tr><td><strong style="color:#E6EDF3">' + (r.name||'-') + '</strong><br><span class="muted" style="font-size:.75rem">' + (r.email||'') + '</span></td>'
      + '<td class="muted">' + (r.email||'-') + '</td>'
      + '<td>' + typeBadge + '</td>'
      + '<td>' + statusBadge(r.status || 'new') + '</td>'
      + '<td class="muted" style="font-size:.8rem">' + loc + '</td>'
      + '<td class="muted">' + fmtDate(r.date) + '</td>'
      + '<td><div class="action-group">'
      + '<button class="btn-action" onclick="viewLead(' + JSON.stringify(r).replace(/"/g,'&quot;') + ')">View</button>'
      + '</div></td></tr>';
  }).join('');
  
  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) {
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  var pHtml = '<span class="page-info">' + (page+1) + ' / ' + totalPages + '</span>';
  if (page > 0) pHtml = '<button class="page-btn" onclick="goPage(' + (page-1) + ')">Prev</button>' + pHtml;
  if (page < totalPages - 1) pHtml += '<button class="page-btn" onclick="goPage(' + (page+1) + ')">Next</button>';
  document.getElementById('pagination').innerHTML = pHtml;
}

window.goPage = function(p) { page = p; renderTable(); };

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.type;
    applyFilter();
  });
});

document.getElementById('search-input').addEventListener('input', applyFilter);

function viewLead(record) {
  var type = record.type === 'kit' ? 'Kit Purchase Request' : 'Reference Card Download';
  var details = 'Lead Details:\n\n'
    + 'Type: ' + type + '\n'
    + 'Name: ' + record.name + '\n'
    + 'Email: ' + record.email + '\n'
    + 'Company: ' + (record.company || 'N/A') + '\n'
    + 'Location: ' + ([record.city, record.country].filter(Boolean).join(', ') || 'N/A') + '\n'
    + 'Status: ' + (record.status || 'new') + '\n'
    + 'Date: ' + fmtDate(record.date);
  alert(details);
}
</script>

<script>
(function() {
  var sidebar = document.querySelector('.admin-sidebar');
  var toggle = document.getElementById('mobile-menu-btn');
  var overlay = document.getElementById('mobile-overlay');
  
  function closeMobile() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
  }
  
  toggle.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
  });
  
  overlay.addEventListener('click', closeMobile);
  
  document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
    link.addEventListener('click', closeMobile);
  });
})();
</script>
</body>
</html>

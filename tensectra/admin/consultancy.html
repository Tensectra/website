      <div class="sidebar-section">CRM</div>
      <a href="/admin/consultancy" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Consultancy</a>
      <a href="/admin/applications"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Applications</a>
      <a href="/admin/leads"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>Leads</a>
      <a href="/admin/payments"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a>
      <div class="sidebar-section">Lists</div>

      <div class="sidebar-section">Careers</div>
      <a href="/admin/jobs"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Job Postings</a>
    </nav>
    <div class="sidebar-footer">
      <span class="sidebar-user-email" id="admin-user-email">Loading...</span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <main class="admin-main">
    <div class="admin-header">
      <div><h1>Consultancy Enquiries</h1><p class="admin-header-sub" id="header-count">Loading...</p></div>
      <div class="admin-header-actions">
        <button class="btn-export" id="export-btn">Export CSV</button>
      </div>
    </div>
    <div class="admin-content">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="new">New</button>
        <button class="filter-btn" data-filter="contacted">Contacted</button>
        <button class="filter-btn" data-filter="proposal_sent">Proposal Sent</button>
        <button class="filter-btn" data-filter="won">Won</button>
        <button class="filter-btn" data-filter="lost">Lost</button>
        <input class="filter-search" id="search-input" type="text" placeholder="Search name, email, company">
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">Enquiries</span>
          <span class="table-card-count" id="table-count">0 records</span>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr>
              <th>Name</th><th>Phone</th><th>Company</th><th>Service</th><th>Status</th>
              <th>Location</th><th>Date</th><th>Actions</th>
            </tr></thead>
            <tbody id="enquiries-tbody"><tr><td colspan="8" style="text-align:center;padding:40px" class="muted">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>
</div>

<div class="detail-modal-overlay" id="detail-modal-overlay">
  <div class="detail-modal">
    <div class="detail-modal-header">
      <h3 id="detail-modal-title">Record Detail</h3>
      <button class="detail-modal-close" id="detail-modal-close">&times;</button>
    </div>
    <div class="detail-modal-body" id="detail-modal-body"></div>
    <div class="detail-modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('detail-modal-overlay').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/admin.js"></script>
<script>
var allRows = [];
var filtered = [];
var activeFilter = 'all';
var PAGE_SIZE = 25;
var page = 0;
var pricing = {};
var tierNames = { '1':'Corporate Cohort','2':'Architecture Workshop','3':'Architecture Consultation',retainer:'Architecture Retainer',unsure:'TBD' };

window.reloadTable = loadData;

document.addEventListener('adminReady', async function () {
  var client = window._supabase;
  var { data: priceData } = await client.from('consultancy_pricing').select('tier,amount,currency');
  (priceData || []).forEach(function (p) { pricing[p.tier] = { amount: p.amount, currency: p.currency }; });
  loadData();
});

async function loadData() {
  var client = window._supabase;
  console.log('[Consultancy] Loading...');
  var { data, error } = await client.from('consultancy_enquiries').select('*').order('submitted_at', { ascending: false });
  console.log('[Consultancy] Result:', { count: (data || []).length, error: error ? error.message : null });
  if (error) { alert('Error: ' + error.message); return; }
  allRows = data || [];
  document.getElementById('header-count').textContent = allRows.length + ' total enquiries';
  applyFilter();
}

function applyFilter() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();
  filtered = allRows.filter(function (r) {
    var matchStatus = activeFilter === 'all' || r.status === activeFilter;
    var matchSearch = !q || (r.name||'').toLowerCase().includes(q) || (r.email||'').toLowerCase().includes(q) || (r.company||'').toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });
  page = 0;
  renderTable();
}

function renderTable() {
  document.getElementById('table-count').textContent = filtered.length + ' records';
  var start = page * PAGE_SIZE;
  var rows = filtered.slice(start, start + PAGE_SIZE);
  if (!rows.length) {
    document.getElementById('enquiries-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px" class="muted">No records found</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  document.getElementById('enquiries-tbody').innerHTML = rows.map(function (r) {
  var tier = tierNames[r.tier] || r.tier || '-';
    var loc = [r.city, r.country_name].filter(Boolean).join(', ') || '-';
    var did = 'dd-' + r.id;
    return '<tr><td><strong style="color:#E6EDF3">' + (r.name||'-') + '</strong><br><span class="muted" style="font-size:.75rem">' + (r.email||'') + '</span></td>'
      + '<td class="muted" style="font-size:.8rem">' + (r.phone||'-') + '</td>'
      + '<td class="muted">' + (r.company||'-') + '</td>'
      + '<td class="muted">' + tier + '</td>'
      + '<td>' + statusBadge(r.status) + '</td>'
      + '<td class="muted" style="font-size:.8rem">' + loc + '</td>'
      + '<td class="muted">' + fmtDate(r.submitted_at) + '</td>'
      + '<td><div class="action-dropdown" id="' + did + '">'
      + '<button class="action-dropdown-toggle" onclick="toggleDropdown(\'' + did + '\')">' + '... Actions</button>'
      + '<div class="action-dropdown-menu">'
      + '<button class="action-dropdown-item" onclick="closeDropdowns();viewRecord(' + JSON.stringify(r).replace(/"/g,'&quot;') + ',\'consultancy\');">View Details</button>'
      + '<button class="action-dropdown-item" onclick="closeDropdowns();updateStatus(\'consultancy_enquiries\',\'' + r.id + '\',\'contacted\',loadData);">Mark Contacted</button>'
      + '<button class="action-dropdown-item" onclick="closeDropdowns();openPaymentModal(' + JSON.stringify(r).replace(/"/g,'&quot;') + ');">Send Pay Link</button>'
      + '<button class="action-dropdown-item danger" onclick="closeDropdowns();updateStatus(\'consultancy_enquiries\',\'' + r.id + '\',\'lost\',loadData);">Mark Lost</button>'
      + '</div></div></td></tr>';
  }).join('');
  
  var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  var pHtml = '<span class="page-info">' + (page+1) + ' / ' + totalPages + '</span>';
  if (page > 0) pHtml = '<button class="page-btn" onclick="goPage(' + (page-1) + ')">Prev</button>' + pHtml;
  if (page < totalPages - 1) pHtml += '<button class="page-btn" onclick="goPage(' + (page+1) + ')">Next</button>';
  document.getElementById('pagination').innerHTML = pHtml;
}

window.goPage = function (p) { page = p; renderTable(); };

document.querySelectorAll('.filter-btn').forEach(function (btn) {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });
});

document.getElementById('search-input').addEventListener('input', applyFilter);

function openPaymentModal(r) { alert('Payment link for: ' + r.name); }

function toggleDropdown(id) {
  closeDropdowns();
  var menu = document.querySelector('#' + id + ' .action-dropdown-menu');
  if (menu) menu.classList.toggle('open');
}
function closeDropdowns() {
  document.querySelectorAll('.action-dropdown-menu.open').forEach(function(m){ m.classList.remove('open'); });
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.action-dropdown')) closeDropdowns();
});

window.viewRecord = function(record, type) {
  var overlay = document.getElementById('detail-modal-overlay');
  var title   = document.getElementById('detail-modal-title');
  var body    = document.getElementById('detail-modal-body');
  if (!overlay) return;
  var fields = [];
  if (type === 'consultancy') {
    title.textContent = 'Enquiry - ' + (record.name || '');
    fields = [
      { section: 'Contact', cols: [
        { label:'Full Name', val: record.name },
        { label:'Email', val: record.email },
        { label:'Phone', val: record.phone },
        { label:'Company', val: record.company }
      ]},
      { section: 'Enquiry', cols: [
        { label:'Service / Tier', val: tierNames[record.tier] || record.tier },
        { label:'Status', val: record.status },
        { label:'Budget', val: record.budget },
        { label:'Timeline', val: record.timeline }
      ]},
      { section: 'Message', single: true, cols: [
        { label:'Message', val: record.message }
      ]},
      { section: 'Location & Tracking', cols: [
        { label:'City', val: record.city },
        { label:'Country', val: record.country_name },
        { label:'Submitted', val: fmtDate(record.submitted_at) },
        { label:'Notes', val: record.notes }
      ]}
    ];
  }
  body.innerHTML = fields.map(function(sec) {
    return '<div class="detail-section">'
      + '<div class="detail-section-title">' + sec.section + '</div>'
      + '<div class="detail-grid' + (sec.single ? ' single' : '') + '">'
      + sec.cols.map(function(f) {
          var v = (f.val !== null && f.val !== undefined && f.val !== '') ? f.val : null;
          return '<div class="detail-field">'
            + '<span class="detail-label">' + f.label + '</span>'
            + '<span class="detail-value' + (v ? '' : ' empty') + '">' + (v || 'Not provided') + '</span>'
            + '</div>';
        }).join('')
      + '</div></div>';
  }).join('');
  overlay.classList.add('open');
};

document.addEventListener('DOMContentLoaded', function() {
  var ov = document.getElementById('detail-modal-overlay');
  document.getElementById('detail-modal-close').addEventListener('click', function(){ ov.classList.remove('open'); });
  ov.addEventListener('click', function(e){ if (e.target === ov) ov.classList.remove('open'); });
});

document.getElementById('export-btn').addEventListener('click', function() {
  if (!filtered.length) { showToast('No data to export', 'info'); return; }
  var headers = ['name','email','phone','company','tier','status','city','country_name','submitted_at','message'];
  var csv = [headers.join(',')].concat(filtered.map(function(r) {
    return headers.map(function(h) {
      var v = r[h] !== null && r[h] !== undefined ? String(r[h]) : '';
      return '"' + v.replace(/"/g,'""') + '"';
    }).join(',');
  })).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'consultancy-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('Exported ' + filtered.length + ' rows', 'success');
});
</script>

<script>
(function() {
  var sidebar = document.querySelector('.admin-sidebar');
  var toggle = document.getElementById('mobile-menu-btn');
  var overlay = document.getElementById('mobile-overlay');
  function closeMobile() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
  }
  toggle.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', closeMobile);
  document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
    link.addEventListener('click', closeMobile);
  });
})();
</script>
</body>
</html>

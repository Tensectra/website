      <div class="sidebar-section">CRM</div>

  <main class="admin-main">
    <div class="admin-header">
      <div><h1>Consultancy Enquiries</h1><p class="admin-header-sub" id="header-count"></p></div>
    </div>
    <div class="admin-content">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="new">New</button>
        <button class="filter-btn" data-filter="contacted">Contacted</button>
        <button class="filter-btn" data-filter="proposal_sent">Proposal Sent</button>
        <button class="filter-btn" data-filter="won">Won</button>
        <button class="filter-btn" data-filter="lost">Lost</button>
        <input class="filter-search" id="search-input" type="text" placeholder="Search name, email, company�">
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">Enquiries</span>
          <span class="table-card-count" id="table-count"></span>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr>
              <th>Name</th><th>Company</th><th>Service</th><th>Status</th>
              <th>Location</th><th>Date</th><th>Actions</th>
            </tr></thead>
            <tbody id="enquiries-tbody"><tr><td colspan="7" style="text-align:center;padding:40px" class="muted">Loading�</td></tr></tbody>
          </table>

      </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  var allRows    = [];
  var filtered   = [];
  var activeFilter = 'all';
  var PAGE_SIZE  = 25;
  var page       = 0;
  var pricing    = {};  // tier ? { amount, currency }
  var tierNames  = { '1':'Corporate Cohort','2':'Architecture Workshop','3':'Architecture Consultation',retainer:'Architecture Retainer',unsure:'TBD' };

  window.reloadTable = loadData;

  document.addEventListener('adminReady', async function () {
    var client = window._supabase;
    // Load consultancy_pricing for default amounts
    var { data: priceData } = await client.from('consultancy_pricing').select('tier,amount,currency');
    (priceData || []).forEach(function (p) { pricing[p.tier] = { amount: p.amount, currency: p.currency }; });
    loadData();
  });

  async function loadData() {
    var client = window._supabase;
    var { data, error } = await client.from('consultancy_enquiries')
      .select('*').order('submitted_at', { ascending: false });
    if (error) { showToast('Load error: ' + error.message, 'error'); return; }
    allRows = data || [];
    document.getElementById('header-count').textContent = allRows.length + ' total enquiries';
    applyFilter();
  }

  function applyFilter() {
    var q = (document.getElementById('search-input').value || '').toLowerCase();
    filtered = allRows.filter(function (r) {
      var matchStatus = activeFilter === 'all' || r.status === activeFilter;
      var matchSearch = !q || (r.name||'').toLowerCase().includes(q) || (r.email||'').toLowerCase().includes(q) || (r.company||'').toLowerCase().includes(q);
      return matchStatus && matchSearch;
    });
    page = 0;
    renderTable();
  }

  function renderTable() {
    document.getElementById('table-count').textContent = filtered.length + ' records';
    var start = page * PAGE_SIZE;
    var rows  = filtered.slice(start, start + PAGE_SIZE);
    if (!rows.length) {
      document.getElementById('enquiries-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px" class="muted">No records found</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    document.getElementById('enquiries-tbody').innerHTML = rows.map(function (r) {
      var tier = tierNames[r.tier] || r.tier || '�';
      var loc  = [r.city, r.country_name].filter(Boolean).join(', ') || '�';
      return '<tr>'
        + '<td><strong style="color:#E6EDF3">' + (r.name||'�') + '</strong><br><span class="muted" style="font-size:.75rem">' + (r.email||'') + '</span></td>'
        + '<td class="muted">' + (r.company||'�') + '</td>'
        + '<td class="muted">' + tier + '</td>'
        + '<td>' + statusBadge(r.status) + '</td>'
        + '<td class="muted" style="font-size:.8rem">' + loc + '</td>'
        + '<td class="muted">' + fmtDate(r.submitted_at) + '</td>'
        + '<td><div class="action-group">'
        + '<button class="btn-action" onclick="openConsultancyDetail(' + JSON.stringify(r).replace(/"/g, '&quot;') + ')">View</button>'
        + '<button class="btn-action btn-pay" onclick="openPaymentLinkModal(' + JSON.stringify(r).replace(/"/g, '&quot;') + ',\'consultancy\',' + JSON.stringify(pricing[r.tier]||{amount:25000000,currency:\'NGN\'}).replace(/"/g,'&quot;') + ')">?? Pay Link</button>'
        + '</div></td>'
        + '</tr>';
    }).join('');

    // Pagination
    var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    var pHtml = '<span class="page-info">' + (page+1) + ' / ' + totalPages + '</span>';
    if (page > 0) pHtml = '<button class="page-btn" onclick="goPage(' + (page-1) + ')">? Prev</button>' + pHtml;
    if (page < totalPages - 1) pHtml += '<button class="page-btn" onclick="goPage(' + (page+1) + ')">Next ?</button>';
    document.getElementById('pagination').innerHTML = pHtml;
  }

  window.goPage = function (p) { page = p; renderTable(); };

  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('search-input').addEventListener('input', applyFilter);
</script>

<script>
// Mobile menu toggle
(function() {
  var sidebar = document.querySelector('.admin-sidebar');
  var toggle = document.getElementById('mobile-menu-btn');
  var overlay = document.getElementById('mobile-overlay');
  
  function closeMobile() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
  }
  
  toggle.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
  });
  
  overlay.addEventListener('click', closeMobile);
  
  // Close on nav click
  document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
    link.addEventListener('click', closeMobile);
  });
})();
</script>

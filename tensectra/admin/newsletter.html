<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var d=document.documentElement,t=localStorage.getItem("tensectra-theme")||"dark";d.setAttribute("data-theme",t);}());</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter - Tensectra Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css?v=10">
  <link rel="icon" type="image/png" href="../images/tensectra-logo.png">
</head>
<body class="admin-body">
<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo2.png" alt="Tensectra">
      <div><div class="sidebar-logo-text">TENSECTRA</div><div class="sidebar-badge">ADMIN</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Main</div>
      <a href="/admin/dashboard"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="sidebar-section">CRM</div>
      <a href="/admin/consultancy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Consultancy</a>
      <a href="/admin/applications"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Applications</a>
      <a href="/admin/leads"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>Leads</a>
      <a href="/admin/payments"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a>
      <div class="sidebar-section">Lists</div>
      <a href="/admin/newsletter" class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Newsletter</a>
    </nav>
    <div class="sidebar-footer">
      <span class="sidebar-user-email" id="admin-user-email">Loading...</span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <!-- Mobile menu toggle -->
  <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <main class="admin-main">
    <div class="admin-header">
      <div><h1>Newsletter Subscribers</h1><p class="admin-header-sub" id="header-count"></p></div>
      <div class="admin-header-actions">
        <button class="btn-export" id="export-btn">Export CSV</button>
      </div>
    </div>
    <div class="admin-content">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="general">General</button>
        <button class="filter-btn" data-filter="alumni">Alumni</button>
        <button class="filter-btn" data-filter="pro_members">Pro Members</button>
        <button class="filter-btn" data-filter="waitlist">Waitlist</button>
        <input class="filter-search" id="search-input" type="text" placeholder="Search email or name">
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">Subscribers</span>
          <span class="table-card-count" id="table-count"></span>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr>
              <th>Email</th><th>Name</th><th>Phone</th><th>List</th><th>Source</th>
              <th>Status</th><th>Subscribed</th><th>Actions</th>
            </tr></thead>
            <tbody id="subs-tbody"><tr><td colspan="8" style="text-align:center;padding:40px" class="muted">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>
</div>

<div class="detail-modal-overlay" id="detail-modal-overlay">
  <div class="detail-modal">
    <div class="detail-modal-header">
      <h3 id="detail-modal-title">Record Detail</h3>
      <button class="detail-modal-close" id="detail-modal-close">&times;</button>
    </div>
    <div class="detail-modal-body" id="detail-modal-body"></div>
    <div class="detail-modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('detail-modal-overlay').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  var allRows      = [];
  var filtered     = [];
  var activeFilter = 'all';
  var PAGE_SIZE    = 40;
  var page         = 0;

  document.addEventListener('adminReady', function () { loadData(); });

  async function loadData() {
    var client = window._supabase;
    
    // Load newsletter subscribers
    var { data: newsData, error: newsError } = await client.from('newsletter_subscribers')
      .select('*').order('subscribed_at', { ascending: false });
    if (newsError) { console.error('Newsletter error:', newsError); }
    
    // Load waitlist submissions
    var { data: waitData, error: waitError } = await client.from('waitlist_submissions')
      .select('*').order('submitted_at', { ascending: false });
    if (waitError) { console.error('Waitlist error:', waitError); }
    
    // Combine both sources
    allRows = (newsData || []).map(function(r) { return Object.assign({}, r, {_source: 'newsletter'}); })
      .concat((waitData || []).map(function(r) { 
        return {
          email: r.email,
          name: r.name,
          list_type: 'waitlist',
          source: r.location_source || 'form',
          subscribed: true,
          subscribed_at: r.submitted_at,
          _source: 'waitlist',
          _full: r
        };
      }));
    
    document.getElementById('header-count').textContent =
      allRows.filter(function (r) { return r.subscribed; }).length + ' active • ' + allRows.length + ' total';
    applyFilter();
  }

  function applyFilter() {
    var q = (document.getElementById('search-input').value || '').toLowerCase();
    filtered = allRows.filter(function (r) {
      var matchList = activeFilter === 'all' || r.list_type === activeFilter;
      var matchSearch = !q || (r.email||'').toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q);
      return matchList && matchSearch;
    });
    page = 0;
    renderTable();
  }

  function renderTable() {
    document.getElementById('table-count').textContent = filtered.length + ' records';
    var start = page * PAGE_SIZE;
    var rows  = filtered.slice(start, start + PAGE_SIZE);
    if (!rows.length) {
      document.getElementById('subs-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px" class="muted">No subscribers found</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    document.getElementById('subs-tbody').innerHTML = rows.map(function (r) {
      var subBadge = r.subscribed
        ? '<span class="status status-succeeded">Active</span>'
        : '<span class="status status-lost">Unsubscribed</span>';
      var phone = r._full ? (r._full.phone || r._full.whatsapp || '-') : (r.phone || '-');
      var did = 'dd-nl-' + (r.id || Math.random().toString(36).slice(2));
      var rData = JSON.stringify(r).replace(/"/g,'&quot;');
      return '<tr>'
        + '<td class="mono" style="font-size:.8rem">' + (r.email||'-') + '</td>'
        + '<td>' + (r.name||'-') + '</td>'
        + '<td class="muted" style="font-size:.8rem">' + phone + '</td>'
        + '<td class="muted">' + (r.list_type||'-') + '</td>'
        + '<td class="muted">' + (r.source||'-') + '</td>'
        + '<td>' + subBadge + '</td>'
        + '<td class="muted">' + fmtDate(r.subscribed_at) + '</td>'
        + '<td><div class="action-dropdown" id="' + did + '">'
        + '<button class="action-dropdown-toggle" onclick="toggleDropdown(\'' + did + '\')">' + '... Actions</button>'
        + '<div class="action-dropdown-menu">'
        + '<button class="action-dropdown-item" onclick="closeDropdowns();viewRecord(' + rData + ',\'subscriber\');">View Details</button>'
        + '</div></div></td>'
        + '</tr>';
    }).join('');

    var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    var pHtml = '<span class="page-info">' + (page+1) + ' / ' + totalPages + '</span>';
    if (page > 0) pHtml = '<button class="page-btn" onclick="goPage(' + (page-1) + ')">Prev</button>' + pHtml;
    if (page < totalPages - 1) pHtml += '<button class="page-btn" onclick="goPage(' + (page+1) + ')">Next</button>';
    document.getElementById('pagination').innerHTML = pHtml;
  }

  window.goPage = function (p) { page = p; renderTable(); };

  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('search-input').addEventListener('input', applyFilter);

  // CSV export (updated to include phone)
  document.getElementById('export-btn').addEventListener('click', function () {
    var rows = filtered;
    if (!rows.length) return showToast('No data to export', 'info');
    var headers = ['email','name','phone','list_type','source','subscribed','subscribed_at'];
    var csv = [headers.join(',')].concat(rows.map(function (r) {
      var phone = r._full ? (r._full.phone || r._full.whatsapp || '') : (r.phone || '');
      var row = { email: r.email, name: r.name, phone: phone, list_type: r.list_type, source: r.source, subscribed: r.subscribed, subscribed_at: r.subscribed_at };
      return headers.map(function (h) {
        var v = row[h] !== null && row[h] !== undefined ? String(row[h]) : '';
        return '"' + v.replace(/"/g, '""') + '"';
      }).join(',');
    })).join('\n');
    var a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'subscribers-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    showToast('Exported ' + rows.length + ' rows', 'success');
  });

  // Dropdown helpers
  window.toggleDropdown = function(id) {
    closeDropdowns();
    var menu = document.querySelector('#' + id + ' .action-dropdown-menu');
    if (menu) menu.classList.toggle('open');
  };
  window.closeDropdowns = function() {
    document.querySelectorAll('.action-dropdown-menu.open').forEach(function(m){ m.classList.remove('open'); });
  };
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.action-dropdown')) closeDropdowns();
  });

  // View modal
  window.viewRecord = function(record, type) {
    var overlay = document.getElementById('detail-modal-overlay');
    var title   = document.getElementById('detail-modal-title');
    var body    = document.getElementById('detail-modal-body');
    if (!overlay) return;
    var full = record._full || record;
    title.textContent = (type === 'subscriber' ? 'Subscriber' : 'Waitlist') + ' - ' + (record.email || '');
    var fields = [
      { section: 'Contact', cols: [
        { label:'Name', val: record.name },
        { label:'Email', val: record.email },
        { label:'Phone / WhatsApp', val: full.phone || full.whatsapp },
        { label:'List Type', val: record.list_type }
      ]},
      { section: 'Details', cols: [
        { label:'Source', val: record.source || full.location_source },
        { label:'Status', val: record.subscribed ? 'Active' : 'Unsubscribed' },
        { label:'City', val: full.city },
        { label:'Country', val: full.country_name }
      ]},
      { section: 'Waitlist Info', cols: [
        { label:'Product', val: full.product },
        { label:'Skill Level', val: full.skill_level },
        { label:'When Joining', val: full.when_joining },
        { label:'Heard From', val: full.heard_from }
      ]},
      { section: 'Message', single: true, cols: [
        { label:'Reason / Note', val: full.reason },
        { label:'Subscribed', val: fmtDate(record.subscribed_at) }
      ]}
    ];
    body.innerHTML = fields.map(function(sec) {
      return '<div class="detail-section">'
        + '<div class="detail-section-title">' + sec.section + '</div>'
        + '<div class="detail-grid' + (sec.single ? ' single' : '') + '">'
        + sec.cols.map(function(f) {
            var v = (f.val !== null && f.val !== undefined && f.val !== '') ? f.val : null;
            return '<div class="detail-field">'
              + '<span class="detail-label">' + f.label + '</span>'
              + '<span class="detail-value' + (v ? '' : ' empty') + '">' + (v || 'Not provided') + '</span>'
              + '</div>';
          }).join('')
        + '</div></div>';
    }).join('');
    overlay.classList.add('open');
  };

  document.addEventListener('DOMContentLoaded', function() {
    var ov = document.getElementById('detail-modal-overlay');
    var cl = document.getElementById('detail-modal-close');
    if (cl) cl.addEventListener('click', function(){ ov.classList.remove('open'); });
    if (ov) ov.addEventListener('click', function(e){ if (e.target === ov) ov.classList.remove('open'); });
  });
</script>

<script>
// Mobile menu toggle
(function() {
  var sidebar = document.querySelector('.admin-sidebar');
  var toggle = document.getElementById('mobile-menu-btn');
  var overlay = document.getElementById('mobile-overlay');
  
  function closeMobile() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
  }
  
  toggle.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
  });
  
  overlay.addEventListener('click', closeMobile);
  
  // Close on nav click
  document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
    link.addEventListener('click', closeMobile);
  });
})();
</script>
</body>
</html>

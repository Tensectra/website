<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  var allRows      = [];
  var filtered     = [];
  var activeFilter = 'all';
  var PAGE_SIZE    = 30;
  var page         = 0;

  document.addEventListener('adminReady', function () { loadData(); });

  async function loadData() {
    var client = window._supabase;
    var { data, error } = await client.from('payments')
      .select('*').order('created_at', { ascending: false });
    if (error) { showToast('Load error: ' + error.message, 'error'); return; }
    allRows = data || [];
    document.getElementById('header-count').textContent = allRows.length + ' total records';
    // Revenue summary
    var totalNgn = allRows.filter(function (p) { return p.status === 'succeeded' && p.currency === 'NGN'; })
      .reduce(function (s, p) { return s + (p.amount_cents || 0); }, 0);
    var totalUsd = allRows.filter(function (p) { return p.status === 'succeeded' && p.currency === 'USD'; })
      .reduce(function (s, p) { return s + (p.amount_cents || 0); }, 0);
    var parts = [];
    if (totalNgn) parts.push('?' + (totalNgn/100).toLocaleString('en-NG', { minimumFractionDigits:0 }));
    if (totalUsd) parts.push('$' + (totalUsd/100).toLocaleString());
    if (parts.length) document.getElementById('revenue-total').textContent = 'Total: ' + parts.join(' � ');
    applyFilter();
  }

  function applyFilter() {
    var q = (document.getElementById('search-input').value || '').toLowerCase();
    filtered = allRows.filter(function (r) {
      var matchStatus = activeFilter === 'all' || r.status === activeFilter;
      var matchSearch = !q
        || (r.payer_name||'').toLowerCase().includes(q)
        || (r.payer_email||'').toLowerCase().includes(q)
        || (r.paystack_reference||'').toLowerCase().includes(q)
        || (r.product_ref||'').toLowerCase().includes(q);
      return matchStatus && matchSearch;
    });
    page = 0;
    renderTable();
  }

  function renderTable() {
    document.getElementById('table-count').textContent = filtered.length + ' records';
    var start = page * PAGE_SIZE;
    var rows  = filtered.slice(start, start + PAGE_SIZE);
    if (!rows.length) {
      document.getElementById('payments-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px" class="muted">No payments found</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    document.getElementById('payments-tbody').innerHTML = rows.map(function (r) {
      var ref = r.paystack_reference || r.stripe_payment_id || '�';
      return '<tr>'
        + '<td class="mono">' + ref.slice(0, 20) + (ref.length > 20 ? '�' : '') + '</td>'
        + '<td><strong style="color:#E6EDF3">' + (r.payer_name||'�') + '</strong><br><span class="muted" style="font-size:.75rem">' + (r.payer_email||'') + '</span></td>'
        + '<td class="muted">' + (r.product_ref||r.product_type||'�') + '</td>'
        + '<td style="color:#28C840;font-weight:600;font-family:monospace">' + fmtAmt(r.amount_cents, r.currency) + '</td>'
        + '<td class="muted" style="text-transform:capitalize">' + (r.payment_method||'�') + '</td>'
        + '<td>' + statusBadge(r.status) + '</td>'
        + '<td class="muted">' + fmtDate(r.created_at) + '</td>'
        + '</tr>';
    }).join('');

    var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    var pHtml = '<span class="page-info">' + (page+1) + ' / ' + totalPages + '</span>';
    if (page > 0) pHtml = '<button class="page-btn" onclick="goPage(' + (page-1) + ')">? Prev</button>' + pHtml;
    if (page < totalPages - 1) pHtml += '<button class="page-btn" onclick="goPage(' + (page+1) + ')">Next ?</button>';
    document.getElementById('pagination').innerHTML = pHtml;
  }

  window.goPage = function (p) { page = p; renderTable(); };

  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('search-input').addEventListener('input', applyFilter);
</script>

<script>
// Mobile menu toggle
(function() {
  var sidebar = document.querySelector('.admin-sidebar');
  var toggle = document.getElementById('mobile-menu-btn');
  var overlay = document.getElementById('mobile-overlay');
  
  function closeMobile() {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
  }
  
  toggle.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
  });
  
  overlay.addEventListener('click', closeMobile);
  
  // Close on nav click
  document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
    link.addEventListener('click', closeMobile);
  });
})();
</script>
